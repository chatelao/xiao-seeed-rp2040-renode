name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Renode
      id: cache-renode
      uses: actions/cache@v4
      with:
        path: test/renode
        key: ${{ runner.os }}-renode-1.16.1

    - name: Cache Pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('test/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Build Tools
      run: |
        chmod +x src/install.sh
        ./src/install.sh

    - name: Install Test Tools
      run: |
        chmod +x test/install.sh
        ./test/install.sh

    - name: Verify Installations
      run: |
        pio --version
        robot --version || [[ $? -eq 251 ]]
        ls -l test/renode/renode

    - name: Build Firmware
      run: |
        pio run

    - name: Run Full Test Suite
      run: |
        ./test/renode/renode-test test/full_suite.robot
