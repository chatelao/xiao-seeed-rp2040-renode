name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Renode
      id: cache-renode
      uses: actions/cache@v4
      with:
        path: test/renode
        key: ${{ runner.os }}-renode-1.16.1

    - name: Cache Pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('test/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Build Tools
      run: |
        chmod +x src/install.sh
        ./src/install.sh

    - name: Install Test Tools
      run: |
        chmod +x test/install.sh
        ./test/install.sh

    - name: Verify Installations
      run: |
        pio --version
        robot --version || [[ $? -eq 251 ]]
        ls -l test/renode/renode

    - name: Build Firmware
      run: |
        pio run

    - name: Build BEMF Loop Example
      run: |
        pio run -d examples/bemf_loop

    - name: Build DMA Pacing Example
      run: |
        pio run -d examples/dma_pacing

    - name: Build I2C Sensor Example
      run: |
        pio run -d examples/i2c_sensor

    - name: Build PIO Blink Example
      run: |
        pio run -d examples/pio_blink

    - name: Build Documentation
      run: |
        pip install -r docs/requirements.txt
        mkdocs build

    - name: Run Full Test Suite
      run: |
        ./test/renode/renode-test test/full_suite.robot

    - name: Run BEMF Loop Test
      run: |
        ./test/renode/renode-test test/bemf_loop.robot

    - name: Run DMA Pacing Test
      run: |
        ./test/renode/renode-test test/dma_pacing.robot

    - name: Run I2C Sensor Test
      run: |
        ./test/renode/renode-test test/i2c_sensor.robot

    - name: Run PIO Blink Test
      run: |
        ./test/renode/renode-test test/pio_blink.robot

  spice-verification:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ngspice
      run: |
        sudo apt-get update
        sudo apt-get install -y ngspice

    - name: Run SPICE Verification
      run: |
        chmod +x test/run_spice_tests.sh
        ./test/run_spice_tests.sh
